<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time-Intensity評価アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍽️ Time-Intensity評価アプリ</h1>
        
        <div class="control-panel">
            <div class="input-group">
                <label for="sampleName">サンプル名:</label>
                <input type="text" id="sampleName" placeholder="例: サンプルA">
            </div>
            
            <div class="input-group">
                <label for="attribute">評価属性:</label>
                <input type="text" id="attribute" placeholder="例: 甘味、苦味、酸味など">
            </div>

            <div class="input-group">
                <label for="maxTime">X軸 最大時間(秒):</label>
                <input type="number" id="maxTime" value="60" min="10" max="300">
            </div>

            <div class="input-group">
                <label for="maxIntensity">Y軸 最大強度:</label>
                <input type="number" id="maxIntensity" value="10" min="5" max="100">
            </div>
        </div>

        <div class="action-buttons">
            <button id="applySettings" class="btn btn-primary">⚙️ 設定を適用</button>
            <button id="clearBtn" class="btn btn-secondary">🗑️ 描画をクリア</button>
            <button id="resetBtn" class="btn btn-danger">🔄 全リセット</button>
        </div>

        <div class="canvas-container">
            <canvas id="drawCanvas"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>

        <div class="export-section">
            <button id="exportCsvBtn" class="btn btn-success">📥 CSV出力</button>
        </div>

        <div class="data-list">
            <h3>📋 記録データ（補間後）</h3>
            <div id="dataTable"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
